# Example tagclean config. Copy and edit to point at your dataset.
input_csv: data/question_tag.csv
tag_answer_json: data/tag_answer.json
artifact_root: artifacts
run_id: cleaning_run_v1

# Models. Single embedding model (E5) drives all geometry. The prior
# EmbeddingGemma cross-validation gate has been replaced by E5 cosine
# + row-level kNN-overlap multi-gates inside Stage 3 / discover.
embedding_backend: sentence-transformers
e5_model: intfloat/multilingual-e5-large-instruct

# Override the E5-instruct prompt for your domain. The default is generic; the
# Bengali NID/voter domain benefits from something like the example below.
# e5_instruction: |
#   You are an expert at matching Bangladeshi National Identity Card (NID) and
#   voter registration queries. Identify the most semantically relevant question
#   from the document, prioritizing exact phrase matches and context-aware
#   matching of intent (self-service vs. failed attempt vs. agent request).

# Text normalization. "bn" runs Bengali Unicode normalization;
# "none" disables language-specific steps.
language: bn

# Stage 3 (boundary policy) + Stage 5 (audit) call `claude -p` headlessly.
# No API key — calls route through the user's Claude Code subscription
# (ANTHROPIC_API_KEY / AUTH_TOKEN / BASE_URL are stripped from the
# subprocess env so subscription auth always wins).
judge_mode: claude              # claude | heuristic
stage5_model: sonnet            # Stage QA reviewer model
stage5_effort: medium
claude_fallback_model: sonnet   # used when primary is overloaded
claude_call_timeout_s: 300
qa_rows_per_packet: 20

# Pipeline knobs
boundary_policy_threshold: 0.85
boundary_policy_max_cluster_size: 6
top_n: 40
near_duplicate_threshold: 0.98
e5_merge_threshold: 0.90
knn_overlap_threshold: 0.30
concurrency: 6
