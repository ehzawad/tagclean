# Real-models config for end-to-end validation:
#   E5 (1024d) + EmbeddingGemma (768d) embeddings, GPT-5.5 audit via agents.
input_csv: examples/order_cancel/question_tag.csv
tag_answer_json: examples/order_cancel/tag_answer.json
artifact_root: examples/order_cancel/artifacts
run_id: order_cancel_real_3tags

# Real embeddings.
embedding_backend: sentence-transformers
e5_model: intfloat/multilingual-e5-large-instruct
gemma_model: google/embeddinggemma-300m
gemma_dim: 768

# English domain — skip Bengali normalization.
language: none

# Override the default Bengali instruction to match the e-commerce domain.
e5_instruction: "You are an expert at matching e-commerce customer-support questions to their canonical intents. Identify the most semantically relevant question by intent and concrete details, prioritizing exact phrase matches and context-aware matching."

# Real GPT.
openai_model: gpt-5.5
openai_reasoning_effort: high
judge_mode: agents
self_consistency_passes: 1

# 15 rows per tag → buffer = all of them.
audit_buffer_size: 15
audit_rows_per_packet: 24
top_n: 10
